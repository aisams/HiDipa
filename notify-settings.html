<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>通知配置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./notify-settings.css" />
  </head>
  <body>
    <main class="notify-page" role="main">
      <div class="notify-wrap">
        <section class="panel" aria-labelledby="notify-config-title">
          <h2 id="notify-config-title" class="panel-title">
            <span class="panel-icon" aria-hidden="true">🔔</span>
            通知配置
          </h2>

          <div class="form-grid">
            <label class="field-row" for="ding-token">
              <span class="field-label">钉钉群Token</span>
              <span class="field-control">
                <input id="ding-token" type="text" placeholder="请输入钉钉群Token" />
              </span>
            </label>

            <label class="field-row" for="emails">
              <span class="field-label">邮件地址</span>
              <span class="field-control">
                <input id="emails" type="text" value="liuqiuyan@quant-cloud.com" />
                <small class="help-text">多个邮箱地址用、号分隔</small>
              </span>
            </label>
          </div>
        </section>

        <section class="panel" aria-labelledby="message-type-title">
          <h2 id="message-type-title" class="panel-title">
            <span class="panel-icon panel-icon-warning" aria-hidden="true">🔔</span>
            消息类型
          </h2>

          <div class="msg-group-title">投资组合运行</div>

          <div class="msg-list">
            <label class="check-row disabled">
              <input type="checkbox" checked disabled />
              <span>灾难</span>
            </label>
            <label class="check-row sub-row">
              <input type="checkbox" checked />
              <span>钉钉群</span>
            </label>
            <label class="check-row sub-row disabled">
              <input type="checkbox" checked disabled />
              <span>邮件</span>
            </label>
            <label class="check-row">
              <input type="checkbox" />
              <span>告警</span>
            </label>
            <label class="check-row">
              <input type="checkbox" />
              <span>普通</span>
            </label>
          </div>
        </section>

        <section class="panel map-panel" aria-labelledby="map-title">
          <h2 id="map-title" class="panel-title">
            <span class="panel-icon" aria-hidden="true">📍</span>
            地图定位
          </h2>
          <p class="map-note">已定位：深圳储能大厦</p>
          <div id="map" class="map-container" role="region" aria-label="深圳储能大厦地图"></div>
          <div class="map-actions">
            <a
              class="map-link"
              target="_blank"
              rel="noopener noreferrer"
              href="https://uri.amap.com/search?keyword=%E6%B7%B1%E5%9C%B3%E5%82%A8%E8%83%BD%E5%A4%A7%E5%8E%A6"
              >在高德地图中打开</a
            >
          </div>
        </section>

        <div class="action-row">
          <button class="save-btn" type="button">保存设置</button>
          <a class="back-link" href="./index.html">返回首页</a>
        </div>
      </div>
    </main>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (function () {
        const fallback = { name: "深圳储能大厦", lat: 22.5431, lon: 114.0579 };
        const map = L.map("map", { zoomControl: true }).setView([fallback.lat, fallback.lon], 15);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);

        function placeMarker(point) {
          L.marker([point.lat, point.lon]).addTo(map).bindPopup(point.name).openPopup();
          map.setView([point.lat, point.lon], 16);
        }

        placeMarker(fallback);

        fetch(
          "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
            encodeURIComponent("深圳储能大厦")
        )
          .then((res) => (res.ok ? res.json() : Promise.reject()))
          .then((list) => {
            if (!Array.isArray(list) || list.length === 0) return;
            const hit = list[0];
            const point = {
              name: hit.display_name || "深圳储能大厦",
              lat: Number(hit.lat),
              lon: Number(hit.lon),
            };
            if (Number.isFinite(point.lat) && Number.isFinite(point.lon)) {
              map.eachLayer((layer) => {
                if (layer instanceof L.Marker) map.removeLayer(layer);
              });
              placeMarker(point);
            }
          })
          .catch(() => {
            /* 保留兜底坐标 */
          });
      })();
    </script>
  </body>
</html>
